<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUNXI ZHUANG | The Digital Flâneur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;400&family=Roboto+Mono&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        /* 隐藏滚动条但保留滚动功能 */
        ::-webkit-scrollbar { display: none; }

        .mono { font-family: 'Roboto Mono', monospace; }

        /* 顶部大字体的描边效果 */
        .outline-text {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 0.3);
            color: transparent;
            transition: all 0.5s;
        }
        .outline-text:hover {
            -webkit-text-stroke: 1px rgba(255, 255, 255, 1);
        }
    </style>
</head>
<body>

    <header class="fixed top-0 left-0 w-full z-50 p-4 md:p-8 bg-gradient-to-b from-black to-transparent">
        <h1 class="text-[12vw] leading-none font-black tracking-tighter uppercase outline-text select-none">
            Digital Flâneur
        </h1>
    </header>

    <footer class="fixed bottom-0 left-0 w-full z-50 p-6 md:p-10 flex justify-between items-end bg-gradient-to-t from-black to-transparent">
        <div class="flex flex-col md:flex-row gap-6 md:gap-20 mono text-[10px] tracking-[0.3em] uppercase opacity-60">
            <a href="#spatial" class="hover:text-white transition-colors">01. Spatial Logic</a>
            <a href="#visual" class="hover:text-white transition-colors">02. Visual Drift</a>
            <a href="#lab" class="hover:text-white transition-colors">03. Intervention Lab</a>
        </div>
        <div class="hidden md:block mono text-[9px] opacity-30 tracking-widest uppercase">
            © 2026 KUNXI ZHUANG / coldzest_
        </div>
    </footer>

    <main class="relative z-10">
        
        <section class="h-screen flex flex-col justify-center items-center px-6">
            <div class="w-full max-w-lg aspect-[3/4] bg-zinc-900 overflow-hidden relative group">
                <div class="absolute inset-0 flex items-center justify-center text-zinc-700 mono text-xs">
                    [ Your Image Here ]
                </div>
                <div class="absolute bottom-8 left-8">
                    <h2 class="text-4xl font-light tracking-widest uppercase">Kunxi Zhuang</h2>
                    <p class="text-xs mono mt-4 opacity-50 tracking-widest">Architect / Digital Observer / HCI Researcher</p>
                </div>
            </div>
        </section>

        <section id="spatial" class="h-screen flex items-center justify-center border-t border-zinc-900">
            <p class="mono text-zinc-800 text-[15vw] select-none uppercase font-black">Spatial</p>
        </section>

        <section id="visual" class="h-screen flex items-center justify-center border-t border-zinc-900">
            <p class="mono text-zinc-800 text-[15vw] select-none uppercase font-black">Drift</p>
        </section>

    </main>

</body>
</html>
