<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUNXI | FLÂNEUR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            scroll-snap-type: y mandatory; 
            height: 100vh;
            overflow-x: hidden;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- 固定 UI 外壳 --- */
        .fixed-ui {
            position: fixed;
            inset: 0;
            z-index: 100;
            padding: 3rem;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title-kunxi {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-weight: 900;
            pointer-events: auto;
            cursor: pointer;
        }

        /* 底部导航响应式调整 */
        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            pointer-events: auto;
        }

        .module-link {
            display: inline-block;
            transition: all 0.4s ease;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.5rem; 
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-decoration: none;
            color: white;
        }

        .sub-caption {
            font-size: 0.65rem;
            line-height: 1.5;
            margin-top: 0.75rem;
            color: rgba(255,255,255,0.4);
            font-style: italic;
            max-width: 220px;
        }

        /* --- 滚动内容 --- */
        section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start;
            position: relative;
            overflow: hidden;
        }

        .video-content video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(0.4) brightness(0.6);
        }

        .map-content {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        }

        .map-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 4vw 4vw;
        }

        .scroll-element {
            position: absolute;
            top: 3rem; right: 3rem;
            text-align: right;
        }

        .title-flaneur {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .dot {
            position: absolute;
            width: 6px; height: 6px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 15px #fff;
        }

        /* --- 手机端适配：核心修正区 --- */
        @media (max-width: 768px) {
            .fixed-ui { padding: 1.5rem; }
            .title-kunxi { font-size: 15vw; }
            .title-flaneur { font-size: 15vw; }
            .scroll-element { top: 1.5rem; right: 1.5rem; }
            
            /* 手机端改为纵向排列，不消失 */
            .bottom-nav {
                grid-template-columns: 1fr; 
                gap: 1.5rem;
                margin-bottom: 1rem;
            }
            .module-link { font-size: 1.2rem; } /* 稍微调小一点防止溢出 */
            .sub-caption { margin-top: 0.4rem; font-size: 0.6rem; max-width: 100%; }
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="title-kunxi" onclick="location.href='index.html'">KUNXI</div>
        
        <nav class="bottom-nav">
            <div class="flex flex-col">
                <a href="#spatial" class="module-link">Spatial Logic</a>
                <p class="sub-caption">“Buildings are static, logic is fluid.”</p>
            </div>
            <div class="flex flex-col">
                <a href="visual-drift.html" class="module-link">Visual Drift</a>
                <p class="sub-caption">“The city is an interface. Walking is the interaction.”</p>
            </div>
            <div class="flex flex-col">
                <a href="#lab" class="module-link">Intervention Lab</a>
                <p class="sub-caption">“Prototyping the invisible boundaries.”</p>
            </div>
        </nav>
    </div>

    <section class="video-content">
        <video autoplay loop muted playsinline>
            <source src="https://cdn.coverr.co/videos/coverr-tokyo-street-night-drifting-3011/1080p.mp4" type="video/mp4">
        </video>
        <div class="scroll-element">
            <div class="title-flaneur">FL&acirc;NEUR</div>
        </div>
    </section>

    <section class="map-content">
        <div class="map-grid"></div>
        <div class="dot" style="top: 30%; left: 20%;"></div>
        <div class="dot" style="top: 55%; left: 45%;"></div>
        <div class="dot" style="top: 48%; left: 80%;"></div>
        <div class="dot" style="top: 72%; left: 75%;"></div>
    </section>

    <script>
        const magneticElements = document.querySelectorAll('.module-link, .title-kunxi');
        magneticElements.forEach((el) => {
            el.addEventListener('mousemove', function(e) {
                if(window.innerWidth > 768) { // 仅在桌面端开启磁吸
                    const rect = this.getBoundingClientRect();
                    const x = e.clientX - rect.left - rect.width / 2;
                    const y = e.clientY - rect.top - rect.height / 2;
                    this.style.transform = `translate(${x / 5}px, ${y / 5}px)`;
                }
            });
            el.addEventListener('mouseleave', function() {
                this.style.transform = 'translate(0px, 0px)';
            });
        });
    </script>
</body>
</html>
