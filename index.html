<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUNXI ZHUANG | The Digital Flâneur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400&family=Roboto+Mono&display=swap');
        body { font-family: 'Inter', sans-serif; cursor: crosshair; }
        .mono { font-family: 'Roboto Mono', monospace; }
        .column-hover:hover { flex-grow: 1.5; }
    </style>
</head>
<body class="bg-black text-zinc-100 overflow-hidden">

    <header class="fixed top-0 w-full p-8 z-50 flex justify-between items-baseline mix-blend-difference">
        <h1 class="text-xl tracking-[0.3em] font-light">KUNXI ZHUANG</h1>
        <nav class="space-x-8 text-[10px] tracking-widest mono uppercase opacity-60 hover:opacity-100 transition-opacity">
            <a href="#">About</a>
            <a href="#">Writing</a>
        </nav>
    </header>

    <main class="flex h-screen w-full transition-all duration-700 ease-in-out">
        
        <section class="column-hover flex-1 border-r border-zinc-900 flex flex-col justify-center items-center transition-all duration-500 group relative overflow-hidden">
            <div class="z-10 text-center">
                <h2 class="text-sm tracking-[0.4em] mono text-zinc-500 group-hover:text-white transition-colors">01. SPATIAL LOGIC</h2>
                <p class="text-[10px] mt-4 opacity-0 group-hover:opacity-100 transition-opacity duration-700 tracking-widest text-zinc-400">Architecture & Urban Systems</p>
            </div>
            <div class="absolute inset-0 bg-zinc-800 opacity-0 group-hover:opacity-10 transition-opacity duration-1000"></div>
        </section>

        <section class="column-hover flex-1 border-r border-zinc-900 flex flex-col justify-center items-center transition-all duration-500 group relative overflow-hidden">
            <div class="z-10 text-center">
                <h2 class="text-sm tracking-[0.4em] mono text-zinc-500 group-hover:text-white transition-colors">02. VISUAL DRIFT</h2>
                <p class="text-[10px] mt-4 opacity-0 group-hover:opacity-100 transition-opacity duration-700 tracking-widest text-zinc-400">Captured by coldzest_</p>
            </div>
            <div class="absolute inset-0 bg-zinc-800 opacity-0 group-hover:opacity-10 transition-opacity duration-1000"></div>
        </section>

        <section class="column-hover flex-1 flex flex-col justify-center items-center transition-all duration-500 group relative overflow-hidden">
            <div class="z-10 text-center">
                <h2 class="text-sm tracking-[0.4em] mono text-zinc-500 group-hover:text-white transition-colors">03. INTERVENTION LAB</h2>
                <p class="text-[10px] mt-4 opacity-0 group-hover:opacity-100 transition-opacity duration-700 tracking-widest text-zinc-400">HCI & Future Experiences</p>
            </div>
            <div class="absolute inset-0 bg-zinc-800 opacity-0 group-hover:opacity-10 transition-opacity duration-1000"></div>
        </section>

    </main>

    <footer class="fixed bottom-0 w-full p-8 z-50">
        <p class="text-[9px] tracking-[0.5em] text-zinc-600 uppercase">The city is an interface. Walking is the interaction.</p>
    </div>

</body>
</html>
