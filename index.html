<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KUNXI | FLÂNEUR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        body { 
            background-color: #fff; 
            color: #000; 
            font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased;
            margin: 0;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- 框架层：KUNXI & FOOTER (绝对不动) --- */
        .frame-fixed {
            position: fixed;
            inset: 0;
            pointer-events: none; /* 穿透点击 */
            z-index: 100;
            padding: 2rem;
        }

        .name-anchor {
            position: absolute;
            top: 2rem;
            left: 2rem;
            background: white; /* 关键：遮挡下方上滑的内容 */
            padding-right: 2rem;
            pointer-events: auto; /* 恢复点击 */
        }

        .title-kunxi {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.05em;
            font-weight: 900;
            text-transform: uppercase;
        }

        .footer-anchor {
            position: absolute;
            bottom: 2rem;
            left: 0;
            width: 100%;
            text-align: center;
        }

        .footer-text {
            font-size: 8px;
            letter-spacing: 1.2em;
            opacity: 0.2;
            text-transform: uppercase;
            font-weight: 900;
        }

        /* --- 滚动层：FLÂNEUR (随动消失) --- */
        .header-drift {
            padding: 2rem;
            display: flex;
            justify-content: flex-end;
            position: relative;
            z-index: 10; /* 最底层，准备被内容层遮盖 */
        }

        .title-flaneur {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.02em;
            font-weight: 300;
            text-transform: uppercase;
        }

        /* --- 内容主区 (中间层) --- */
        .main-content {
            position: relative;
            z-index: 50; /* 盖住 FLÂNEUR，但低于 KUNXI */
            background: white; /* 关键：白色背景作为“遮罩面” */
            padding: 2rem;
            margin-top: 0;
        }

        /* 你的地图带样式 */
        .map-strip {
            width: 100%; height: 180px; background: #0a0a0a; position: relative; margin: 6rem 0;
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M13 4a1 1 0 1 0 2 0 1 1 0 1 0-2 0"/><path d="M4 20h4l1.5-5.5L11 16v5h2v-7l-2-1 1-3 1.5 1.5L17 10"/><path d="m14 10 1-1"/></svg>') 16 16, auto;
        }

        /* 移动端强制对位补丁 */
        @media (max-width: 768px) {
            .frame-fixed, .header-drift, .main-content { padding: 1.5rem; }
            .name-anchor { top: 1.5rem; left: 1.5rem; }
            .title-kunxi, .title-flaneur { font-size: 15vw; }
            .footer-anchor { bottom: 1.5rem; }
        }
    </style>
</head>
<body>

    <div class="frame-fixed">
        <div class="name-anchor">
            <a href="index.html"><h1 class="title-kunxi">KUNXI</h1></a>
        </div>
        <div class="footer-anchor">
            <p class="footer-text">Ways of seeing a city.</p>
        </div>
    </div>

    <header class="header-drift">
        <h2 class="title-flaneur">FL&acirc;NEUR</h2>
    </header>

    <main class="main-content">
        
        <section class="flex flex-col md:flex-row justify-between items-start gap-12 pt-10">
            <div class="w-full max-w-[400px] aspect-[3/4] bg-zinc-50 grayscale"></div>
            <div class="max-w-[280px] text-right ml-auto pt-4">
                <p class="text-[0.8rem] leading-relaxed text-zinc-500">
                    To wander is not to be lost, but to observe the city as a living interface.
                    As an architect, I transition from the heavy logic of masonry...
                </p>
            </div>
        </section>

        <div class="map-strip">
            </div>

        <nav class="mt-40 mb-20 grid grid-cols-1 md:grid-cols-3 gap-20 uppercase">
            </nav>

    </main>

</body>
</html>
