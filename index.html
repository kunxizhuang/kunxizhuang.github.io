<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUNXI | FLÂNEUR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        /* 基础样式 */
        body, html {
            margin: 0; padding: 0;
            background-color: #000;
            color: #fff;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
            /* 启用滚动捕捉 */
            scroll-snap-type: y mandatory; 
            height: 100vh;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- 固定 UI 图层 (名字和底部模块) --- */
        .fixed-ui {
            position: fixed;
            inset: 0;
            z-index: 100;
            padding: 3rem;
            pointer-events: none; /* 让鼠标穿透 UI 操纵下层的滚动 */
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title-kunxi {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-weight: 900;
            pointer-events: auto;
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            pointer-events: auto;
        }

        .module-link {
            display: inline-block;
            transition: all 0.4s ease;
            text-transform: uppercase;
        }
        .module-link:hover { color: rgba(255,255,255,0.5); transform: translateY(-5px); }

        /* --- 滚动内容容器 --- */
        section {
            height: 100vh;
            width: 100vw;
            scroll-snap-align: start; /* 强制对齐 */
            position: relative;
            overflow: hidden;
        }

        /* 第一屏：视频 */
        .video-content video {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(0.4) brightness(0.6);
        }

        /* 第二屏：全屏地图 */
        .map-content {
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* 地图上的装饰网格 */
        .map-grid {
            position: absolute;
            inset: 0;
            background-image: linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                              linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 4vw 4vw;
        }

        /* 坐标点交互 */
        .dot {
            position: absolute;
            width: 8px; height: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff;
        }
        .dot::after {
            content: ''; position: absolute; inset: -4px;
            border: 1px solid #fff; border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(4); opacity: 0; } }

        /* 随动消失的元素 (FLÂNEUR & 宣言) */
        .scroll-element {
            position: absolute;
            top: 3rem; right: 3rem;
            text-align: right;
        }

        .title-flaneur {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            font-weight: 300;
        }

        .manifesto-mini {
            font-size: 0.8rem;
            line-height: 1.8;
            margin-top: 2rem;
            max-width: 300px;
            color: rgba(255,255,255,0.6);
            margin-left: auto;
        }

        @media (max-width: 768px) {
            .title-kunxi, .title-flaneur { font-size: 14vw; }
            .fixed-ui { padding: 1.5rem; }
            .bottom-nav { grid-template-columns: 1fr; gap: 1rem; }
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="title-kunxi">KUNXI</div>
        
        <nav class="bottom-nav">
            <div class="flex flex-col">
                <a href="#spatial" class="module-link font-black text-2xl">Spatial Logic</a>
                <span class="text-[10px] opacity-30 italic mt-1 uppercase tracking-widest">Architecture</span>
            </div>
            <div class="flex flex-col">
                <a href="visual-drift.html" class="module-link font-black text-2xl">Visual Drift</a>
                <span class="text-[10px] opacity-30 italic mt-1 uppercase tracking-widest">Photography</span>
            </div>
            <div class="flex flex-col">
                <a href="#lab" class="module-link font-black text-2xl">Intervention Lab</a>
                <span class="text-[10px] opacity-30 italic mt-1 uppercase tracking-widest">HCI Experiment</span>
            </div>
        </nav>
    </div>

    <section class="video-content">
        <video autoplay loop muted playsinline>
            <source src="https://cdn.coverr.co/videos/coverr-tokyo-street-night-drifting-3011/1080p.mp4" type="video/mp4">
        </video>
        <div class="scroll-element">
            <div class="title-flaneur">FL&acirc;NEUR</div>
            <p class="manifesto-mini">
                To wander is not to be lost, but to observe the city as a living interface. 
                I decode the static logic of architecture into fluid digital narratives.
            </p>
        </div>
    </section>

    <section class="map-content">
        <div class="map-grid"></div>
        
        <div class="dot" style="top: 30%; left: 20%;"></div> <div class="dot" style="top: 55%; left: 45%;"></div> <div class="dot" style="top: 48%; left: 80%;"></div> <div class="dot" style="top: 72%; left: 75%;"></div> <div class="absolute bottom-[20vh] text-center w-full">
            <span class="text-[10px] uppercase tracking-[1.5em] opacity-20 font-black">Active Drift Coordinates</span>
        </div>

        <div class="scroll-element">
            <div class="title-flaneur opacity-10">MAPPING</div>
        </div>
    </section>

</body>
</html>
