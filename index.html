<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KUNXI | FLÂNEUR</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap');

        body {
            background-color: #ffffff;
            color: #000;
            font-family: 'Inter', "Helvetica Neue", Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { display: none; }

        /* 顶部固定容器 */
        .header-frame {
            position: sticky;
            top: 0;
            z-index: 100;
            background: white;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            padding: 2rem;
            border-bottom: 1px solid #000;
        }

        .title-main {
            font-size: 8vw; /* 缩小后的比例，占据左上角 */
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-weight: 900;
        }

        .title-sub {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-weight: 900;
            text-align: right;
        }

        /* 遮罩层：随滚动上升覆盖 Flâneur */
        .content-layer {
            position: relative;
            z-index: 80;
            background: white;
            min-height: 100vh;
            padding: 2rem;
        }

        /* 漫游者文字：放在 Header 下方，随页面滚动被遮挡 */
        .flaneur-wrap {
            position: relative;
            z-index: 50;
            padding: 2rem;
            display: flex;
            justify-content: flex-end;
        }

        @media (max-width: 768px) {
            .title-main, .title-sub { font-size: 12vw; }
            .header-frame, .flaneur-wrap { padding: 1rem; }
        }
    </style>
</head>
<body>

    <header class="header-frame">
        <h1 class="title-main">KUNXI</h1>
        <div class="text-[10px] mono tracking-widest uppercase opacity-40">Architect / Observer</div>
    </header>

    <div class="flaneur-wrap">
        <h2 class="title-sub">FL&acirc;NEUR</h2>
    </div>

    <main class="content-layer">
        
        <section class="grid grid-cols-1 md:grid-cols-2 gap-16 pt-10">
            <div class="w-full aspect-[3/4] bg-zinc-100 flex items-center justify-center grayscale">
                <span class="text-zinc-400 italic text-sm">[ IMAGE_PLACEHOLDER ]</span>
            </div>

            <div class="flex flex-col justify-end pb-12">
                <p class="text-3xl md:text-5xl font-black leading-none tracking-tighter uppercase mb-8">
                    Architectural Logic.<br>
                    Spatial Interaction.
                </p>
                <div class="pt-6 border-t border-black flex justify-between mono text-[10px] tracking-widest uppercase font-bold">
                    <span>Edinburgh / Tokyo</span>
                    <span class="opacity-30">Based in China</span>
                </div>
            </div>
        </section>

        <nav class="mt-32 grid grid-cols-1 md:grid-cols-3 border-t border-black">
            <a href="#spatial" class="group p-8 border-b md:border-b-0 md:border-r border-black hover:bg-black hover:text-white transition-all">
                <span class="block text-[10px] mb-6 opacity-40 uppercase tracking-widest">01</span>
                <span class="text-2xl font-black uppercase tracking-tight">Spatial Logic</span>
            </a>
            <a href="#visual" class="group p-8 border-b md:border-b-0 md:border-r border-black hover:bg-black hover:text-white transition-all">
                <span class="block text-[10px] mb-6 opacity-40 uppercase tracking-widest">02</span>
                <span class="text-2xl font-black uppercase tracking-tight">Visual Drift</span>
            </a>
            <a href="#lab" class="group p-8 hover:bg-black hover:text-white transition-all">
                <span class="block text-[10px] mb-6 opacity-40 uppercase tracking-widest">03</span>
                <span class="text-2xl font-black uppercase tracking-tight">Intervention Lab</span>
            </a>
        </nav>

        <footer class="mt-40 mb-10 text-center">
            <p class="text-[9px] tracking-[0.6em] opacity-20 uppercase font-black">
                The city is an interface. Walking is the interaction.
            </p>
        </footer>
    </main>

</body>
</html>
