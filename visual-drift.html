<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISUAL DRIFT | KUNXI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        body, html {
            margin: 0; padding: 0;
            background-color: #fff;
            color: #000;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- 固定 UI 外壳 --- */
        .fixed-ui {
            position: fixed;
            inset: 0;
            z-index: 100;
            padding: 3rem;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title-kunxi {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-weight: 900;
            pointer-events: auto;
            cursor: pointer;
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            pointer-events: auto;
        }

        .module-link {
            display: inline-block;
            transition: all 0.4s ease;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.875rem; 
            line-height: 2.25rem;
            color: #000;
        }
        .active-module { border-bottom: 4px solid #000; }

        /* --- 随动消失的顶部元素 (FLÂNEUR) --- */
        .scroll-header {
            width: 100%;
            height: 30vh; /* 给顶部留出滚动空间 */
            position: relative;
            padding: 3rem;
            display: flex;
            justify-content: flex-end;
        }

        .title-flaneur {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.02em;
            text-transform: uppercase;
            font-weight: 300;
            text-align: right;
        }

        /* --- 内容区域 --- */
        .drift-content {
            padding: 0 3rem 15vh 3rem;
        }

        /* 城市切换：字号调小，更像副标题 */
        .city-nav {
            display: flex;
            gap: 2rem;
            margin-bottom: 3rem;
        }
        .city-tab {
            font-size: 1rem; /* 显著缩小 */
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            cursor: pointer;
            opacity: 0.2;
            transition: opacity 0.3s;
        }
        .city-tab:hover, .city-tab.active { opacity: 1; }

        /* 随机小图矩阵 (Masonry-like Grid) */
        .photo-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1.5rem;
            align-items: start;
        }

        .photo-item {
            aspect-ratio: 1/1;
            background: #f7f7f7;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        /* 不同的宽高比随机感 */
        .photo-item.portrait { aspect-ratio: 3/4; }
        .photo-item.landscape { aspect-ratio: 4/3; }

        .photo-item img {
            width: 100%; height: 100%;
            object-fit: cover;
            filter: grayscale(1);
            transition: 0.6s;
        }

        .photo-item:hover img {
            filter: grayscale(0);
            transform: scale(1.08);
        }

        /* 悬停时的城市标记 */
        .photo-item::after {
            content: attr(data-city);
            position: absolute;
            bottom: 10px; left: 10px;
            font-size: 8px;
            font-weight: 900;
            text-transform: uppercase;
            background: #fff;
            padding: 2px 5px;
            opacity: 0;
            transition: 0.3s;
        }
        .photo-item:hover::after { opacity: 1; }

        @media (max-width: 768px) {
            .fixed-ui { padding: 1.5rem; }
            .scroll-header { height: 20vh; padding: 1.5rem; }
            .bottom-nav { display: none; }
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="title-kunxi" onclick="location.href='index.html'">KUNXI</div>
        
        <nav class="bottom-nav">
            <div class="flex flex-col"><a href="index.html#spatial" class="module-link">Spatial Logic</a></div>
            <div class="flex flex-col"><a href="visual-drift.html" class="module-link active-module">Visual Drift</a></div>
            <div class="flex flex-col"><a href="index.html#lab" class="module-link">Intervention Lab</a></div>
        </nav>
    </div>

    <header class="scroll-header">
        <h2 class="title-flaneur">FL&acirc;NEUR</h2>
    </header>

    <main class="drift-content">
        
        <nav class="city-nav">
            <span class="city-tab active">Edinburgh</span>
            <span class="city-tab">Abu Dhabi</span>
            <span class="city-tab">Singapore</span>
            <span class="city-tab">Tokyo</span>
        </nav>

        <div class="photo-matrix">
            <div class="photo-item portrait" data-city="Edinburgh">
                <div class="w-full h-full flex items-center justify-center text-[8px] text-zinc-300 italic uppercase">Frame 01</div>
            </div>
            <div class="photo-item" data-city="Tokyo">
                <div class="w-full h-full flex items-center justify-center text-[8px] text-zinc-300 italic uppercase">Frame 02</div>
            </div>
            <div class="photo-item landscape" data-city="Abu Dhabi">
                <div class="w-full h-full flex items-center justify-center text-[8px] text-zinc-300 italic uppercase">Frame 03</div>
            </div>
            <div class="photo-item" data-city="Singapore">
                <div class="w-full h-col flex items-center justify-center text-[8px] text-zinc-300 italic uppercase">Frame 04</div>
            </div>
            <div class="photo-item portrait" data-city="Edinburgh"></div>
            <div class="photo-item" data-city="Tokyo"></div>
            <div class="photo-item" data-city="Singapore"></div>
            <div class="photo-item landscape" data-city="Abu Dhabi"></div>
            <div class="photo-item portrait" data-city="Tokyo"></div>
            <div class="photo-item" data-city="Edinburgh"></div>
            <div class="photo-item" data-city="Abu Dhabi"></div>
            <div class="photo-item" data-city="Singapore"></div>
        </div>

    </main>

    <footer class="p-20 text-center opacity-10 text-[8px] font-black uppercase tracking-[1.5em]">
        End of Drift / Stay Wandering
    </footer>

</body>
</html>
