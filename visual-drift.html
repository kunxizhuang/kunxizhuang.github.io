<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISUAL DRIFT | KUNXI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');
        body { background-color: #fff; color: #000; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; margin: 0; overflow-x: hidden; }
        ::-webkit-scrollbar { display: none; }

        /* --- 1. 固定框架 (同步首页) --- */
        .ui-frame-fixed { position: fixed; inset: 0; pointer-events: none; z-index: 100; padding: 2rem; }
        .name-box { position: absolute; top: 2rem; left: 2rem; pointer-events: auto; }
        .title-kunxi { font-size: 5vw; line-height: 0.8; letter-spacing: -0.05em; font-weight: 900; text-transform: uppercase; }
        .footer-box { position: absolute; bottom: 2rem; left: 0; width: 100%; text-align: center; }
        .footer-text { font-size: 7px; letter-spacing: 1.5em; opacity: 0.2; text-transform: uppercase; font-weight: 900; }

        /* --- 2. 随动副标题 (FLÂNEUR) --- */
        .header-drift { padding: 2rem; display: flex; justify-content: flex-end; position: relative; z-index: 10; }
        .title-flaneur { font-size: 5vw; line-height: 0.8; letter-spacing: -0.02em; font-weight: 300; text-transform: uppercase; }

        /* --- 3. 内容区 --- */
        .main-content { position: relative; z-index: 50; background: white; padding: 2rem; }
        
        /* 瀑布流/错落网格布局 */
        .photo-matrix {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            grid-auto-rows: 200px; /* 定义基础行高 */
            gap: 3rem; /* 大间隙 */
            max-width: 1600px;
            margin: 0 auto;
        }

        .photo-item { 
            background: #f8f8f8; overflow: hidden; position: relative; cursor: pointer;
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .photo-item:hover { transform: scale(1.02); }
        .photo-item img { width: 100%; height: 100%; object-fit: cover; filter: grayscale(1); transition: 0.8s; }
        .photo-item:hover img { filter: grayscale(0); }

        /* 大小错落类 */
        .span-v { grid-row: span 2; } /* 竖长图 */
        .span-h { grid-column: span 2; } /* 横宽图 */
        .span-large { grid-column: span 2; grid-row: span 2; } /* 大方块 */

        /* 信息弹窗样式 */
        #info-overlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.95);
            z-index: 200; display: none; flex-direction: column;
            align-items: center; justify-content: center; cursor: pointer;
        }
        .info-text { font-size: 10vw; font-weight: 900; text-transform: uppercase; letter-spacing: -0.05em; }
        .info-sub { font-size: 10px; tracking: 0.5em; opacity: 0.3; margin-top: 1rem; }

        /* 底部导航同步 */
        .content-container { padding: 0 2rem; max-width: 1400px; margin: 0 auto; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .module-link { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; }

        @media (max-width: 768px) {
            .photo-matrix { grid-template-columns: repeat(2, 1fr); gap: 1rem; }
            .span-h, .span-large { grid-column: span 2; }
            .title-kunxi, .title-flaneur { font-size: 10vw; }
            .nav-grid { grid-template-columns: 1fr; gap: 4rem; }
        }
    </style>
</head>
<body>

    <div class="ui-frame-fixed">
        <div class="name-box"><a href="index.html"><h1 class="title-kunxi">KUNXI</h1></a></div>
        <div class="footer-box"><p class="footer-text">Ways of seeing a city.</p></div>
    </div>

    <header class="header-drift"><h2 class="title-flaneur">FL&acirc;NEUR</h2></header>

    <main class="main-content">
        
        <div class="photo-matrix">
            <div class="photo-item span-v" data-location="EDINBURGH" onclick="showInfo(this)">
                <div class="w-full h-full flex items-center justify-center text-[8px] text-zinc-300 italic">FRAME_01</div>
            </div>
            <div class="photo-item span-h" data-location="TOKYO" onclick="showInfo(this)"></div>
            <div class="photo-item" data-location="SHANGHAI" onclick="showInfo(this)"></div>
            <div class="photo-item span-large" data-location="SINGAPORE" onclick="showInfo(this)"></div>
            <div class="photo-item" data-location="TOKYO" onclick="showInfo(this)"></div>
            <div class="photo-item span-v" data-location="EDINBURGH" onclick="showInfo(this)"></div>
            <div class="photo-item" data-location="ABU DHABI" onclick="showInfo(this)"></div>
            <div class="photo-item span-h" data-location="SHANGHAI" onclick="showInfo(this)"></div>
            <div class="photo-item" data-location="TOKYO" onclick="showInfo(this)"></div>
        </div>

        <nav class="content-container mt-40 pb-40 nav-grid">
            <div class="group flex flex-col items-start">
                <a href="spatial.html" class="module-link inline-block transition-transform duration-700 group-hover:translate-x-2">Spatial Logic</a>
                <p class="text-zinc-500 text-[9px] mt-2 italic">Buildings are static, logic is fluid.</p>
            </div>
            <div class="group flex flex-col items-start">
                <a href="visual-drift.html" class="border-b-2 border-black module-link inline-block">Visual Drift</a>
                <p class="text-zinc-500 text-[9px] mt-2 italic">The city is an interface. Walking is the interaction.</p>
            </div>
            <div class="group flex flex-col items-start">
                <a href="lab.html" class="module-link inline-block transition-transform duration-700 group-hover:translate-x-2">Intervention Lab</a>
                <p class="text-zinc-500 text-[9px] mt-2 italic">Prototyping the invisible boundaries.</p>
            </div>
        </nav>
    </main>

    <div id="info-overlay" onclick="hideInfo()">
        <div class="info-sub">LOCATED IN</div>
        <div class="info-text" id="target-city">CITY NAME</div>
        <div class="info-sub">— CLICK ANYWHERE TO CLOSE —</div>
    </div>

    <script>
        function showInfo(el) {
            const city = el.getAttribute('data-location');
            document.getElementById('target-city').innerText = city;
            document.getElementById('info-overlay').style.display = 'flex';
        }
        function hideInfo() {
            document.getElementById('info-overlay').style.display = 'none';
        }
    </script>

</body>
</html>
