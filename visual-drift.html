<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VISUAL DRIFT | KUNXI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        body { 
            background-color: #fff; color: #000; font-family: 'Inter', sans-serif; 
            -webkit-font-smoothing: antialiased; margin: 0; overflow-x: hidden; 
        }
        ::-webkit-scrollbar { display: none; }

        /* --- 1. 固定 UI 框架 (与首页 1:1 对位) --- */
        .ui-frame-fixed { 
            position: fixed; inset: 0; pointer-events: none; z-index: 100; padding: 2rem; 
        }
        .name-box { 
            position: absolute; top: 2rem; left: 2rem; pointer-events: auto; 
        }
        /* 字号同步为 5vw */
        .title-kunxi { 
            font-size: 5vw; line-height: 0.8; letter-spacing: -0.05em; font-weight: 900; text-transform: uppercase; 
        }
        
        .footer-box { 
            position: absolute; bottom: 2rem; left: 0; width: 100%; text-align: center; 
        }
        .footer-text { 
            font-size: 7px; letter-spacing: 1.5em; opacity: 0.2; text-transform: uppercase; font-weight: 900; 
        }

        /* --- 2. 随动副标题 --- */
        .header-drift { 
            padding: 2rem; display: flex; justify-content: flex-end; position: relative; z-index: 10; 
        }
        .title-flaneur { 
            font-size: 5vw; line-height: 0.8; letter-spacing: -0.02em; font-weight: 300; text-transform: uppercase; 
        }

        /* --- 3. 核心内容区 --- */
        .main-content { position: relative; z-index: 50; background: transparent; padding: 0 2rem; }

        /* 城市导航小字号 */
        .city-nav { display: flex; gap: 2rem; margin: 4rem 0; }
        .city-tab { 
            font-size: 10px; font-weight: 900; text-transform: uppercase; letter-spacing: 0.2em; 
            cursor: pointer; opacity: 0.2; transition: 0.3s; 
        }
        .city-tab.active, .city-tab:hover { opacity: 1; }

        /* 摄影矩阵布局 */
        .photo-matrix {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 3rem;
            align-items: start;
            padding-bottom: 10vh;
        }
        .photo-item { 
            background: #f8f8f8; overflow: hidden; position: relative;
            transition: transform 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .photo-item:hover { transform: translateY(-10px); }
        .photo-item.portrait { aspect-ratio: 3/4; }
        .photo-item.landscape { aspect-ratio: 4/3; }
        .photo-item.square { aspect-ratio: 1/1; }

        /* 底部导航同步首页格式 */
        .bottom-nav-container { margin: 10rem 0 5rem 0; }
        .nav-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2rem; }
        .module-link { font-size: 1.5rem; font-weight: 900; text-transform: uppercase; letter-spacing: -0.02em; }
        .active-module { border-bottom: 2px solid #000; }

        @media (max-width: 768px) {
            .ui-frame-fixed, .header-drift { padding: 1.5rem; }
            .name-box { top: 1.5rem; left: 1.5rem; }
            .title-kunxi, .title-flaneur { font-size: 10vw; }
            .nav-grid { grid-template-columns: 1fr; gap: 4rem; }
            .photo-matrix { grid-template-columns: 1fr; gap: 2rem; }
        }
    </style>
</head>
<body>

    <div class="ui-frame-fixed">
        <div class="name-box">
            <a href="index.html"><h1 class="title-kunxi">KUNXI</h1></a>
        </div>
        <div class="footer-box">
            <p class="footer-text">Ways of seeing a city.</p>
        </div>
    </div>

    <header class="header-drift">
        <h2 class="title-flaneur">DRIFT_ARCHIVE</h2>
    </header>

    <main class="main-content">
        
        <nav class="city-nav">
            <span class="city-tab active">Edinburgh</span>
            <span class="city-tab">Tokyo</span>
            <span class="city-tab">Shanghai</span>
            <span class="city-tab">Abu Dhabi</span>
        </nav>

        <div class="photo-matrix">
            <div class="photo-item portrait">
                <div class="w-full h-full flex items-center justify-center text-[8px] text-zinc-300 italic uppercase tracking-widest">Frame_01</div>
            </div>
            <div class="photo-item square"></div>
            <div class="photo-item landscape"></div>
            <div class="photo-item portrait"></div>
            <div class="photo-item square"></div>
            <div class="photo-item portrait"></div>
        </div>

        <nav class="bottom-nav-container nav-grid">
            <div class="group">
                <a href="spatial.html" class="module-link inline-block transition-transform duration-500 group-hover:translate-x-2">Spatial Logic</a>
                <p class="text-zinc-400 text-[9px] mt-2 italic uppercase tracking-widest">Architecture</p>
            </div>
            <div class="group">
                <a href="visual-drift.html" class="module-link active-module inline-block">Visual Drift</a>
                <p class="text-zinc-400 text-[9px] mt-2 italic uppercase tracking-widest">Photography</p>
            </div>
            <div class="group">
                <a href="lab.html" class="module-link inline-block transition-transform duration-500 group-hover:translate-x-2">Intervention Lab</a>
                <p class="text-zinc-400 text-[9px] mt-2 italic uppercase tracking-widest">HCI Experiment</p>
            </div>
        </nav>

        <div class="h-20"></div>

    </main>

</body>
</html>
