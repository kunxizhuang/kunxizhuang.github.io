<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VISUAL DRIFT | KUNXI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;900&display=swap');

        body, html {
            margin: 0; padding: 0;
            background-color: #fff;
            color: #000;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { display: none; }

        /* --- 固定 UI 外壳 (与主页完全一致) --- */
        .fixed-ui {
            position: fixed;
            inset: 0;
            z-index: 100;
            padding: 3rem;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .title-kunxi {
            font-size: 8vw;
            line-height: 0.8;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            font-weight: 900;
            pointer-events: auto;
            cursor: pointer;
        }

        .bottom-nav {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 3rem;
            pointer-events: auto;
        }

        .module-link {
            display: inline-block;
            transition: all 0.4s ease;
            text-transform: uppercase;
            font-weight: 900;
            font-size: 1.875rem; /* text-3xl */
            line-height: 2.25rem;
        }
        .module-link:hover { color: #888; transform: translateY(-5px); }
        .active-module { border-bottom: 4px solid #000; }

        /* --- 可滚动的内容区域 --- */
        .scroll-content {
            position: relative;
            z-index: 10;
            padding: 12vw 3rem 15vh 3rem; /* 为固定的名字和底部留出空间 */
        }

        /* 城市导航条 (去掉数字) */
        .city-nav {
            display: flex;
            gap: 3rem;
            margin-bottom: 4rem;
            overflow-x: auto;
        }
        .city-tab {
            font-size: 2.5rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.05em;
            cursor: pointer;
            opacity: 0.2;
            transition: opacity 0.5s;
        }
        .city-tab.active { opacity: 1; }

        /* 照片排版 (参考图1逻辑，缩小主图) */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(12, 1fr);
            gap: 2rem;
            align-items: start;
        }

        .gallery-info {
            grid-column: span 5;
        }
        .gallery-title {
            font-size: 4vw;
            line-height: 0.9;
            font-weight: 900;
            text-transform: uppercase;
            margin-bottom: 2rem;
        }
        .gallery-desc {
            font-size: 0.85rem;
            line-height: 1.8;
            color: #666;
            max-width: 260px;
        }

        /* [ MAIN PORTRAIT ] 适当缩小 */
        .main-portrait {
            grid-column: span 5; /* 从之前的 7 缩减到 5，腾出更多留白 */
            aspect-ratio: 3/4;
            background: #fbfbfb;
            overflow: hidden;
            border: 1px solid #eee;
        }
        .main-portrait img { width: 100%; height: 100%; object-fit: cover; }

        /* 底部缩略图流 (去掉数字) */
        .thumb-strip {
            grid-column: span 12;
            display: flex;
            gap: 15px;
            margin-top: 6rem;
            overflow-x: auto;
        }
        .thumb-item {
            flex: 0 0 120px;
            aspect-ratio: 1/1;
            background: #f0f0f0;
            cursor: pointer;
            transition: filter 0.3s;
        }
        .thumb-item:hover { filter: brightness(0.8); }

        @media (max-width: 768px) {
            .gallery-grid > * { grid-column: span 12; }
            .fixed-ui { padding: 1.5rem; }
            .bottom-nav { display: none; } /* 手机端隐藏底部防止重叠 */
        }
    </style>
</head>
<body>

    <div class="fixed-ui">
        <div class="title-kunxi" onclick="location.href='index.html'">KUNXI</div>
        
        <nav class="bottom-nav">
            <div class="flex flex-col">
                <a href="index.html#spatial" class="module-link">Spatial Logic</a>
                <span class="text-[10px] opacity-30 italic mt-1 uppercase tracking-widest">Architecture</span>
            </div>
            <div class="flex flex-col">
                <a href="visual-drift.html" class="module-link active-module">Visual Drift</a>
                <span class="text-[10px] opacity-30 italic mt-1 uppercase tracking-widest">Photography</span>
            </div>
            <div class="flex flex-col">
                <a href="index.html#lab" class="module-link">Intervention Lab</a>
                <span class="text-[10px] opacity-30 italic mt-1 uppercase tracking-widest">HCI Experiment</span>
            </div>
        </nav>
    </div>

    <main class="scroll-content">
        
        <nav class="city-nav">
            <span class="city-tab active">Edinburgh</span>
            <span class="city-tab">Abu Dhabi</span>
            <span class="city-tab">Singapore</span>
            <span class="city-tab">Tokyo</span>
        </nav>

        <section class="gallery-grid">
            <div class="gallery-info">
                <h1 class="gallery-title">THE GREY<br>ATLANTIC<br>DRIFT.</h1>
                <p class="gallery-desc">
                    Observing the city as a living interface. These frames capture the heavy logic of masonry in the northern mist.
                </p>
            </div>

            <div class="main-portrait">
                <div class="w-full h-full flex items-center justify-center text-zinc-300 italic text-[10px] tracking-widest">
                    [ VISUAL ENTRY ]
                </div>
            </div>

            <div class="thumb-strip">
                <div class="thumb-item"></div>
                <div class="thumb-item"></div>
                <div class="thumb-item"></div>
                <div class="thumb-item"></div>
                <div class="thumb-item"></div>
                <div class="thumb-item"></div>
                <div class="thumb-item"></div>
                <div class="thumb-item"></div>
            </div>
        </section>

    </main>

</body>
</html>
